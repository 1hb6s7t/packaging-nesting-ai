name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[optimization,test]"

      - name: Run backend tests
        env:
          PYTHONPATH: backend
        run: python -m pytest -q tests/backend

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  release-preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - backend-tests
      - frontend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[optimization,test]"

      - name: Run release preflight without duplicate frontend build
        env:
          PYTHONPATH: backend
        run: |
          python scripts/release_preflight.py \
            --skip-frontend \
            --report-path tmp/ci-release-preflight.json \
            --inventory-path tmp/ci-dependency-inventory.json \
            --evidence-output-dir tmp/ci-release-evidence

      - name: Verify release preflight report
        run: |
          python scripts/verify_release_preflight.py \
            --report tmp/ci-release-preflight.json \
            --output tmp/ci-release-preflight-verification.json \
            --allow-skipped-frontend

      - name: Build CI evidence manifest
        run: |
          python scripts/ci_evidence_manifest.py \
            --preflight-report tmp/ci-release-preflight.json \
            --preflight-verification tmp/ci-release-preflight-verification.json \
            --dependency-inventory tmp/ci-dependency-inventory.json \
            --evidence-dir tmp/ci-release-evidence \
            --output tmp/ci-evidence-manifest.json \
            --allow-skipped-frontend \
            --frontend-build-job "Frontend build" \
            --frontend-artifact-name "frontend-dist-${{ github.sha }}"

      - name: Upload release preflight evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-preflight-evidence-${{ github.sha }}
          path: |
            tmp/ci-evidence-manifest.json
            tmp/ci-release-preflight.json
            tmp/ci-release-preflight-verification.json
            tmp/ci-dependency-inventory.json
            tmp/ci-release-evidence/**
          if-no-files-found: warn
          retention-days: 30

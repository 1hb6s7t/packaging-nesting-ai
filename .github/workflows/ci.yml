name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[optimization,test]"

      - name: Run backend tests
        env:
          PYTHONPATH: backend
        run: python -m pytest -q tests/backend

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  release-preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs:
      - backend-tests
      - frontend-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[optimization,test]"

      - name: Run release preflight without duplicate frontend build
        env:
          PYTHONPATH: backend
        run: |
          python scripts/release_preflight.py \
            --skip-frontend \
            --report-path tmp/ci-release-preflight.json \
            --inventory-path tmp/ci-dependency-inventory.json \
            --evidence-output-dir tmp/ci-release-evidence

      - name: Verify release preflight report
        run: |
          python scripts/verify_release_preflight.py \
            --report tmp/ci-release-preflight.json \
            --output tmp/ci-release-preflight-verification.json \
            --allow-skipped-frontend

      - name: Run release image dependency audit
        run: |
          python scripts/release_image_dependency_audit.py \
            --inventory-output tmp/ci-release-image-dependency-inventory.json \
            --review-output tmp/ci-release-image-dependency-review.json \
            --output tmp/ci-release-image-dependency-audit.json

      - name: Build release handoff bundle
        run: |
          python scripts/release_handoff_bundle.py \
            --preflight-report tmp/ci-release-preflight.json \
            --preflight-verification tmp/ci-release-preflight-verification.json \
            --dependency-inventory tmp/ci-release-image-dependency-inventory.json \
            --dependency-review-audit tmp/ci-release-image-dependency-review.json \
            --release-image-dependency-audit tmp/ci-release-image-dependency-audit.json \
            --output tmp/ci-release-handoff-bundle.json

      - name: Verify release handoff bundle
        run: |
          python scripts/verify_release_handoff_bundle.py \
            --manifest tmp/ci-release-handoff-bundle.json \
            --output tmp/ci-release-handoff-verification.json

      - name: Run go-live readiness dry run
        run: |
          set +e
          python scripts/go_live_readiness_audit.py \
            --handoff-manifest tmp/ci-release-handoff-bundle.json \
            --handoff-verification tmp/ci-release-handoff-verification.json \
            --output tmp/ci-go-live-readiness.json
          status=$?
          set -e
          if [ "$status" -ne 1 ]; then
            echo "expected go-live readiness dry run to exit 1 while production and external acceptance evidence are intentionally absent"
            exit 1
          fi

      - name: Verify go-live readiness dry run
        run: |
          python scripts/verify_go_live_readiness_report.py \
            --report tmp/ci-go-live-readiness.json \
            --output tmp/ci-go-live-readiness-verification.json \
            --allow-blocker "production env audit artifact must be passed, got skipped" \
            --allow-blocker "external acceptance audit artifact must be passed, got skipped"

      - name: Build CI evidence manifest
        run: |
          python scripts/ci_evidence_manifest.py \
            --preflight-report tmp/ci-release-preflight.json \
            --preflight-verification tmp/ci-release-preflight-verification.json \
            --dependency-inventory tmp/ci-release-image-dependency-inventory.json \
            --dependency-review-audit tmp/ci-release-image-dependency-review.json \
            --release-image-dependency-audit tmp/ci-release-image-dependency-audit.json \
            --evidence-dir tmp/ci-release-evidence \
            --handoff-manifest tmp/ci-release-handoff-bundle.json \
            --handoff-verification tmp/ci-release-handoff-verification.json \
            --go-live-readiness tmp/ci-go-live-readiness.json \
            --go-live-readiness-verification tmp/ci-go-live-readiness-verification.json \
            --output tmp/ci-evidence-manifest.json \
            --allow-skipped-frontend \
            --frontend-build-job "Frontend build" \
            --frontend-artifact-name "frontend-dist-${{ github.sha }}"

      - name: Verify CI evidence manifest
        run: |
          python scripts/verify_ci_evidence_manifest.py \
            --manifest tmp/ci-evidence-manifest.json \
            --output tmp/ci-evidence-manifest-verification.json

      - name: Upload release preflight evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-preflight-evidence-${{ github.sha }}
          path: |
            tmp/ci-evidence-manifest.json
            tmp/ci-evidence-manifest-verification.json
            tmp/ci-release-preflight.json
            tmp/ci-release-preflight-verification.json
            tmp/ci-release-handoff-bundle.json
            tmp/ci-release-handoff-verification.json
            tmp/ci-go-live-readiness.json
            tmp/ci-go-live-readiness-verification.json
            tmp/ci-dependency-inventory.json
            tmp/ci-release-image-dependency-inventory.json
            tmp/ci-release-image-dependency-review.json
            tmp/ci-release-image-dependency-audit.json
            tmp/ci-release-evidence/**
          if-no-files-found: warn
          retention-days: 30
